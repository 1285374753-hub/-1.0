<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre da Pesca - Jogue Agora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020813;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            color: white;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* 防止外层拉拽，强制内部滑动 */
        }

        /* 手机框架包裹器 - 变身为短视频滑动容器 */
        .mobile-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background-color: #000;
            height: 100vh;
            height: 100dvh; /* 适配手机浏览器的动态视口高度 */
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            
            /* 短视频核心滑动逻辑 */
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* 隐藏滚动条 */
        .mobile-wrapper::-webkit-scrollbar {
            display: none;
        }
        .mobile-wrapper {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 每一屏的基础设置 */
        .swipe-page {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start; /* 强制对齐顶部 */
            scroll-snap-stop: always; /* 每次只滑动一屏 */
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #051429;
        }

        /* 图片自适应铺满 (类似满屏短视频) */
        .swipe-page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        /* 呼吸缩放动效 (当该屏处于视口中心时触发) */
        .swipe-page.active img {
            animation: scale-in 4s ease-out forwards;
        }
        @keyframes scale-in {
            0% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .font-game {
            font-family: 'Fredoka One', cursive;
        }

        /* 按钮发光 */
        .btn-glow {
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.4), inset 0 0 5px rgba(255, 255, 255, 0.2); transform: scale(1); }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.4); transform: scale(1.03); }
        }

        .shiny-text {
            background: linear-gradient(to bottom, #fffde7 0%, #ffd700 50%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
        }

        /* 向上滑动提示动画 */
        .swipe-up-indicator {
            position: absolute;
            bottom: 140px; /* 避开底部下载栏 */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce-up 1.5s infinite;
            opacity: 0.8;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes bounce-up {
            0%, 100% { transform: translate(-50%, 0); opacity: 0.5; }
            50% { transform: translate(-50%, -15px); opacity: 1; }
        }

        /* 毛玻璃样式增强版 */
        .ios-glass {
            background: rgba(5, 20, 41, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>

<div class="mobile-wrapper">
    
    <!-- 第 1 屏：首屏主视觉 -->
    <div class="swipe-page cursor-pointer active" onclick="redirectToStore()">
        <img src="poster_01_hero.jpg" alt="Desafie o Monstro das Profundezas">
        
        <!-- 向上滑动提示 -->
        <div class="swipe-up-indicator">
            <span class="text-white text-xs font-bold tracking-widest uppercase mb-1 drop-shadow-md">Deslize para cima</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
            </svg>
        </div>
        <!-- 底部渐变遮罩，防止白色海报盖住底部文字 -->
        <div class="absolute bottom-0 w-full h-1/3 bg-gradient-to-t from-[#000] to-transparent pointer-events-none"></div>
    </div>

    <!-- 第 2 屏：炮台升级 -->
    <div class="swipe-page cursor-pointer" onclick="redirectToStore()">
        <img src="poster_02_cannon.jpg" alt="Despertar do Canhão">
        <div class="absolute bottom-0 w-full h-1/3 bg-gradient-to-t from-[#000] to-transparent pointer-events-none"></div>
    </div>

    <!-- 第 3 屏：万倍炮台与金龟 -->
    <div class="swipe-page cursor-pointer" onclick="redirectToStore()">
        <img src="poster_03_10000x.jpg" alt="Canhão de 10.000x">
        <div class="absolute bottom-0 w-full h-1/3 bg-gradient-to-t from-[#000] to-transparent pointer-events-none"></div>
    </div>

    <!-- 第 4 屏：超长游戏截图展示拼接 -->
    <div class="swipe-page cursor-pointer" onclick="redirectToStore()">
        <img src="poster_04_kraken.jpg" alt="Mais Jogabilidade">
        
        <!-- 顶部悬浮文字 -->
        <div class="absolute top-[8%] w-full flex flex-col items-center pointer-events-none drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] z-10">
            <h2 class="font-game text-3xl shiny-text text-center tracking-wide">Prêmios Sem Fim</h2>
            <p class="text-[#4cd0ff] font-bold text-sm text-center mt-1">Novo Boss Épico Chegou!</p>
        </div>

        <div class="absolute bottom-0 w-full h-1/3 bg-gradient-to-t from-[#000] to-transparent pointer-events-none"></div>
    </div>

    <!-- 底部悬浮栏 - 升级为 iOS 毛玻璃悬浮岛 -->
    <div class="ios-glass fixed bottom-0 w-full max-w-[480px] left-1/2 transform -translate-x-1/2 rounded-t-[32px] p-5 pb-6 flex items-center justify-between z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.8)]">
        <div class="flex items-center gap-3">
            <!-- 应用图标加上 iOS 标准的亮边内阴影 -->
            <div class="w-14 h-14 rounded-2xl overflow-hidden shadow-lg border border-white/20 bg-gradient-to-br from-[#ffd700] to-[#ff8c00] shrink-0 relative box-border">
                <img src="app_icon.png" alt="App Icon" class="w-full h-full object-cover relative z-10" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div style="display: none;" class="absolute inset-0 w-full h-full items-center justify-center text-[28px] z-0">🐟</div>
                <!-- 模拟图标上方的反光遮罩 -->
                <div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent pointer-events-none z-20"></div>
            </div>
            
            <div class="flex flex-col justify-center">
                <span class="font-game text-white text-lg leading-tight line-clamp-1 drop-shadow-md">Mestre da Pesca</span>
                <span class="text-white text-xs font-bold bg-gradient-to-r from-[#ff4500] to-[#ff0055] px-2.5 py-0.5 rounded-full inline-block mt-1 w-max shadow-sm">
                    🎁 10.000 Moedas
                </span>
            </div>
        </div>
        
        <button onclick="redirectToStore()" class="btn-glow font-game bg-gradient-to-b from-[#ffed4a] to-[#ff9800] text-[#5b2a00] px-6 py-3.5 rounded-full uppercase tracking-wider shadow-lg transform transition active:scale-95">
            BAIXAR
        </button>
    </div>

</div>

<script>
    // 短视频滑动监听：当页面滑入时添加 active 类触发呼吸缩放动画
    document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.querySelector('.mobile-wrapper');
        const pages = document.querySelectorAll('.swipe-page');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // 移除所有页面的 active
                    pages.forEach(p => p.classList.remove('active'));
                    // 给当前处于视口中心的页面添加 active 触发缓慢放大动画
                    entry.target.classList.add('active');
                }
            });
        }, {
            root: wrapper, // 以滑动容器为视口
            threshold: 0.5 // 超过 50% 可见时认为已滑入该屏
        });

        pages.forEach((el) => {
            observer.observe(el);
        });
    });

    // 模拟跳转到应用商店的函数
    function redirectToStore() {
        const confirmMsg = document.createElement('div');
        confirmMsg.innerHTML = `
            <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; display:flex; align-items:center; justify-content:center;">
                <div style="background:#0a2e5c; border: 2px solid #ffd700; border-radius:1rem; padding:2rem; max-width:80%; text-align:center;">
                    <h2 class="font-game shiny-text text-2xl mb-2">Redirecionando...</h2>
                    <p style="color:white; margin-bottom:1rem;">Você será redirecionado para a loja de aplicativos!</p>
                    <button onclick="this.parentElement.parentElement.remove()" style="background:#ff9800; color:white; font-weight:bold; padding:0.5rem 2rem; border-radius:999px;">OK</button>
                </div>
            </div>
        `;
        document.body.appendChild(confirmMsg);
    }
</script>

</body>
</html>
